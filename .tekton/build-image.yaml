apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  name: nexus-image
  annotations:
    pipelinesascode.tekton.dev/on-comment: "^((/test-all)|(/build-image))"
    pipelinesascode.tekton.dev/on-cel-expression: |-
      target_branch.matches("^(main|release-.*|alauda-.*)$") &&
      !last_commit_title.contains("Auto-commit") &&
      (
        "source/**".pathChanged() ||
        "image/**".pathChanged() ||
        ".tekton/build-image.yaml".pathChanged() ||
        ".tekton/pipeline/nexus-image-build".pathChanged()
      )
    pipelinesascode.tekton.dev/max-keep-runs: "5"
spec:
  timeouts:
    pipeline: "2h"

  pipelineRef:
    name: nexus-image-build

  params:
    - name: git-revision
      value:
        url: "{{ repo_url }}"
        branch: "{{ source_branch }}"
        commit: "{{ revision }}"
        pull-request-number: "{{ pull_request_number }}"
        pull-request-source: "{{ source_branch }}"
        pull-request-target: "{{ target_branch }}"
    - name: clean-cache
      value: "{{ clean-cache }}"

  workspaces:
    - name: source
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteMany
          resources:
            requests:
              storage: 2Gi
    - name: basic-auth
      secret:
        secretName: github-credentials
    - name: registryconfig
      secret:
        secretName: build-harbor.kauto.docfj
    - name: cache
      persistentVolumeClaim:
        claimName: build-cache-nexus

  taskRunTemplate:
    # 让所有任务都以非 root 用户运行。
    podTemplate:
      securityContext:
        fsGroup: 65532
        fsGroupChangePolicy: "OnRootMismatch"

  taskRunSpecs:
    - pipelineTaskName: build-nexus-app
      computeResources:
        limits:
          cpu: "6"
          memory: 6Gi
    - pipelineTaskName: build-nexus-image
      computeResources:
        limits:
          cpu: "2"
          memory: 2Gi
    - pipelineTaskName: image-scan
      computeResources:
        limits:
          cpu: "4"
          memory: 4Gi
