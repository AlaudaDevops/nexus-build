apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  name: nexus-integration-test
  annotations:
    pipelinesascode.tekton.dev/on-comment: "^((/test-all)|(/integration-test))"
    pipelinesascode.tekton.dev/on-cel-expression: |-
      target_branch.matches("^(main|release-.*|alauda-.*)$") &&
      (
        "chart/**".pathChanged() ||
        "testing/**".pathChanged() ||
        ".tekton/integration-test.yaml".pathChanged()
      )
    pipelinesascode.tekton.dev/max-keep-runs: "5"
spec:
  taskRunTemplate:
    podTemplate:
      securityContext:
        fsGroup: 65532
        fsGroupChangePolicy: "OnRootMismatch"
  taskRunSpecs:
    - pipelineTaskName: run-test
      computeResources:
        limits:
          cpu: "4"
          memory: 4Gi
  timeouts:
    pipeline: 5h
    tasks: 5h
  pipelineRef:
    resolver: hub
    params:
      - name: catalog
        value: alauda
      - name: type
        value: tekton
      - name: kind
        value: pipeline
      - name: name
        value: vcluster-integration-test
      - name: version
        value: "0.2"

  params:
    - name: git-revision
      value:
        url: "{{ repo_url }}"
        branch: "{{ source_branch }}"
        commit: "{{ revision }}"
        pull-request-number: "{{ pull_request_number }}"
        pull-request-source: "{{ source_branch }}"
        pull-request-target: "{{ target_branch }}"
    - name: build-test-image
      value:
        image-repository: build-harbor.alauda.cn/devops/nexus-ce-test
        containerfile-path: testing/Containerfile
    - name: tag-template
      value: "v3.76.0-g${ShortSha}"
    - name: test
      value:
        command: |
          set -x
          export KUBECONFIG=$(workspaces.config.path)/vcluster-config
          kubectl config view

          cd $(workspaces.source.path)/testing
          echo "run integration tests..."
          export GODOG_ARGS="--godog.concurrency=1 --godog.format=allure"
          make test-all
    - name: vcluster
      value:
        custom-config: |
          sync:
            toHost:
              ingresses:
                enabled: true
            fromHost:
              storageClasses:
                enabled: true
              ingressClasses:
                enabled: true
    - name: report
      value:
        command: |
          cd $(workspaces.source.path)/testing
          allure generate --clean

          echo "Listing contents of report directory"
          ls -al
        path: testing/allure-report
  workspaces:
    - name: kube-config
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteMany
          resources:
            requests:
              storage: 50Mi
    - name: cache
      persistentVolumeClaim:
        claimName: build-cache
      subPath: golang
    - name: source
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteMany
          resources:
            requests:
              storage: 1Gi
    - name: upload-conf
      secret:
        secretName: upload-allure-report-conf
    - name: registryconfig
      secret:
        secretName: build-harbor.kauto.docfj
    - name: basic-auth
      secret:
        secretName: github-credentials
    - name: gitversion-config
      configMap:
        name: gitversion-config
